<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e3a5f" stroke="#10b981" stroke-width="2"/>
  
  <!-- Compass outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 2"/>
  
  <!-- Compass N arrow (up - blue) -->
  <polygon points="50,14 46,50 50,46 54,50" fill="#3b82f6"/>
  <!-- Compass S arrow (down - lighter) -->
  <polygon points="50,86 54,50 50,54 46,50" fill="#64748b"/>
  <!-- Compass E arrow (right - lighter) -->
  <polygon points="86,50 50,54 54,50 50,46" fill="#64748b"/>
  <!-- Compass W arrow (left - lighter) -->
  <polygon points="14,50 50,46 46,50 50,54" fill="#64748b"/>
  
  <!-- Diagonal arrows NE -->
  <polygon points="76,24 54,46 56,50 60,46" fill="#10b981" opacity="0.8"/>
  <!-- Diagonal arrows SW -->
  <polygon points="24,76 46,54 44,50 40,54" fill="#10b981" opacity="0.8"/>
  <!-- Diagonal arrows NW -->
  <polygon points="24,24 46,46 44,50 40,46" fill="#10b981" opacity="0.6"/>
  <!-- Diagonal arrows SE -->
  <polygon points="76,76 54,54 56,50 60,54" fill="#10b981" opacity="0.6"/>
  
  <!-- Center golden dot -->
  <circle cx="50" cy="50" r="6" fill="#f59e0b"/>
  <circle cx="50" cy="50" r="3" fill="#fbbf24"/>
  
  <!-- N letter -->
  <text x="50" y="12" font-family="Arial" font-weight="bold" font-size="8" fill="#3b82f6" text-anchor="middle">N</text>
</svg>
